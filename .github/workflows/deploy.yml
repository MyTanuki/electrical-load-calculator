name: Build & Deploy React app (dist) - manual only

# ปิดการรันอัตโนมัติเพื่อไม่ให้ชนกับ static.yml (ซึ่ง deploy index.html)
# โปรเจกต์นี้ใช้ index.html เป็นแอปหลัก หากต้องการ deploy เวอร์ชัน React (src/)
# ให้สั่งรัน workflow นี้เองจากแท็บ Actions หรือเปลี่ยน on: กลับเป็น push trigger
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
